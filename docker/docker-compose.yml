# ─────────────────────────────────────────────────────────────────────────
# LMP — local stack: Next.js app + PostgreSQL.
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml up --build
# Then (first run) apply schema + seed:
#   docker compose -f docker/docker-compose.yml exec app npx prisma migrate deploy
#   docker compose -f docker/docker-compose.yml exec app npm run db:seed
# ─────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lmp
    ports:
      - "5432:5432"
    volumes:
      - lmp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lmp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/lmp?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@db:5432/lmp?schema=public"
      AUTH_SECRET: "change-me-in-production-please-32-bytes-min"
      AUTH_URL: "http://localhost:3000"
      NODE_ENV: "production"
    ports:
      - "3000:3000"

volumes:
  lmp_pgdata:
